<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/perfil"></ion-back-button>
    </ion-buttons>
    <ion-title>Cambiar contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="change-content">

  <div class="change-wrapper">

    <section class="change-card">

      <h1>Actualizar contraseña</h1>
      <p>Ingresa tus datos para cambiarla</p>

      <ion-item class="custom-item">
        <ion-label position="stacked">Contraseña actual</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="oldPassword">
        </ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-label position="stacked">Nueva contraseña</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="newPassword">
        </ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-label position="stacked">Confirmar contraseña</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="newPassword2">
        </ion-input>
      </ion-item>

      @if(error) {
        <ion-text color="danger">
          <p class="message">{{ error }}</p>
        </ion-text>
      }

      @if(success) {
        <ion-text color="success">
          <p class="message">Contraseña actualizada correctamente 🔐</p>
        </ion-text>
      }

      <ion-button
        expand="block"
        class="save-button"
        [disabled]="loading"
        (click)="cambiar()">

        @if(loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <span>Actualizar</span>
        }

      </ion-button>

    </section>

  </div>

</ion-content>
