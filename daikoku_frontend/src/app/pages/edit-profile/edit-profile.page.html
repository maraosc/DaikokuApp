<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/perfil"></ion-back-button>
    </ion-buttons>
    <ion-title>Editar perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="edit-profile-content">

  <div class="edit-profile-wrapper">

    <section class="edit-profile-card">
      <h1>Datos de cuenta</h1>
      <p>Actualiza tu usuario y correo</p>

      <ion-item class="custom-item">
        <ion-label position="stacked">Usuario</ion-label>
        <ion-input
          type="text"
          [(ngModel)]="username">
        </ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-label position="stacked">Correo</ion-label>
        <ion-input
          type="email"
          [(ngModel)]="email">
        </ion-input>
      </ion-item>

      @if(error) {
        <ion-text color="danger">
          <p class="message">{{ error }}</p>
        </ion-text>
      }

      @if(success) {
        <ion-text color="success">
          <p class="message">Perfil actualizado correctamente.</p>
        </ion-text>
      }

      <ion-button
        expand="block"
        class="save-button"
        [disabled]="loading"
        (click)="guardar()">

        @if(loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <span>Guardar cambios</span>
        }

      </ion-button>
    </section>

  </div>

</ion-content>
