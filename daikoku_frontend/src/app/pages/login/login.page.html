<ion-content class="ion-padding">

  <div style="margin-top: 80px; text-align: center;">
    <h1>Daikoku</h1>
    <p style="color: var(--ion-color-medium)">Iniciá sesión para continuar</p>
  </div>

  <ion-item>
    <ion-label position="floating">Email</ion-label>
    <ion-input
      type="email"
      [(ngModel)]="email"
      placeholder="tu@email.com">
    </ion-input>
  </ion-item>

  <ion-item style="margin-top: 12px;">
    <ion-label position="floating">Contraseña</ion-label>
    <ion-input
      type="password"
      [(ngModel)]="password"
      (keyup.enter)="login()">
    </ion-input>
  </ion-item>

  @if(error) {
    <ion-text color="danger">
      <p style="padding: 8px 16px;">{{ error }}</p>
    </ion-text>
  }

  <ion-button
    expand="block"
    style="margin-top: 24px;"
    [disabled]="loading"
    (click)="login()">
    @if(loading) {
      <ion-spinner name="crescent"></ion-spinner>
    } @else {
      <span>Ingresar</span>
    }
  </ion-button>

  <div style="text-align: center; margin-top: 16px;">
    <ion-text color="medium">
      ¿No tenés cuenta?
      <a routerLink="/register" style="color: var(--ion-color-primary);">Registrate</a>
    </ion-text>
  </div>

</ion-content>
