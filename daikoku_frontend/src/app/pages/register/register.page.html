<ion-content class="register-content">

  <section class="register-header">
    <h1>Regístrate</h1>
    <p>¿Ya tienes cuenta? <a routerLink="/login">Conéctate</a></p>
  </section>

  <section class="register-card">

    <div style="text-align:center; margin-bottom:16px;">
      <h2>Crear cuenta</h2>
      <p class="register-subtitle">Completa tus datos para registrarte</p>
    </div>

    <ion-item>
      <ion-label position="stacked">Usuario</ion-label>
      <ion-input
        type="text"
        [(ngModel)]="username"
        (ionInput)="error = ''"
        placeholder="tu_usuario">
      </ion-input>
    </ion-item>

    <ion-item style="margin-top:12px;">
      <ion-label position="stacked">Email</ion-label>
      <ion-input
        type="email"
        [(ngModel)]="email"
        (ionInput)="error = ''"
        placeholder="tu@email.com">
      </ion-input>
    </ion-item>

    <ion-item style="margin-top:12px;">
      <ion-label position="stacked">Contraseña</ion-label>
      <ion-input
        type="password"
        (ionInput)="error = ''"
        [(ngModel)]="password"
        placeholder="********">
      </ion-input>
    </ion-item>

    <ion-item style="margin-top:12px;">
      <ion-label position="stacked">Confirmar contraseña</ion-label>
      <ion-input
        type="password"
        [(ngModel)]="password2"
        (ionInput)="error = ''"
        (keyup.enter)="register()"
        placeholder="********">
      </ion-input>
    </ion-item>

    @if(error) {
      <ion-text color="danger">
        <p style="padding: 8px 16px;">{{ error }}</p>
      </ion-text>
    }

    <ion-button
      expand="block"
      class="primary-button"
      [disabled]="loading"
      (click)="register()">
      @if(loading) {
        <ion-spinner name="crescent"></ion-spinner>
      } @else {
        <span>Crear cuenta</span>
      }
    </ion-button>

  </section>

</ion-content>
